    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  contact:
    name: DigitalOcean API Team
    email: api-engineering@digitalocean.com
  termsOfService: https://www.digitalocean.com/legal/terms-of-service-agreement/
servers:
- url: https://api.digitalocean.com
  description: production
security:
- bearer_auth: []
tags:
- name: Certificates
  description: 'In order to perform SSL termination on load balancers, DigitalOcean offers

    two types of [SSL certificate management](https://docs.digitalocean.com/platform/teams/manage-certificates):


    * **Custom**: User-generated certificates may be uploaded to DigitalOcean

    where they will be placed in a fully encrypted and isolated storage system.


    * **Let''s Encrypt**: Certificates may be automatically generated by

    DigitalOcean utilizing an integration with Let''s Encrypt, the free and

    open certificate authority. These certificates will also be automatically

    renewed as required.'
paths:
  /v2/certificates:
    get:
      operationId: certificates_list
      summary: List All Certificates
      description: To list all of the certificates available on your account, send a GET request to `/v2/certificates`.
      parameters:
      - $ref: '#/components/parameters/per_page'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/certificate_name'
      tags:
      - Certificates
      responses:
        '200':
          $ref: '#/components/responses/all_certificates'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/certificates\""
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    opt := &godo.ListOptions{\n        Page:    1,\n        PerPage: 200,\n    }\n\n    certs, _, err := client.Certificates.List(ctx, opt)\n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          certificates = client.certificates.all

          certificates.each'
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          get_resp = client.certificates.list()'
      security:
      - bearer_auth:
        - certificate:read
    post:
      operationId: certificates_create
      summary: Create a New Certificate
      description: 'To upload new SSL certificate which you have previously generated, send a POST

        request to `/v2/certificates`.


        When uploading a user-generated certificate, the `private_key`,

        `leaf_certificate`, and optionally the `certificate_chain` attributes should

        be provided. The type must be set to `custom`.


        When using Let''s Encrypt to create a certificate, the `dns_names` attribute

        must be provided, and the type must be set to `lets_encrypt`.

        '
      tags:
      - Certificates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/certificate_request_lets_encrypt'
              - $ref: '#/components/schemas/certificate_request_custom'
      responses:
        '201':
          $ref: '#/components/responses/new_certificate'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\"name\": \"web-cert-01\", \"type\": \"custom\", \"private_key\": \"'\"$(</path/to/privkey1.pem)\"'\",\"leaf_certificate\": \"'\"$(</path/to/cert1.pem)\"'\",\"certificate_chain\": \"'\"$(</path/to/fullchain1.pem)\"'\"}' \\\n  \"https://api.digitalocean.com/v2/certificates\""
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    key, err := ioutil.ReadFile(\"/path/to/privkey1.pem\")\n    if err != nil {\n        fmt.Print(err)\n    }\n\n    cert, err := ioutil.ReadFile(\"/path/to/cert1.pem\")\n    if err != nil {\n        fmt.Print(err)\n    }\n\n    chain, err := ioutil.ReadFile(\"/path/to/fullchain1.pem\")\n    if err != nil {\n        fmt.Print(err)\n    }\n\n    createRequest := &godo.CertificateRequest{\n        Name:             \"web-cert-01\",\n        PrivateKey:       string(key),\n        LeafCertificate:  string(cert),\n        CertificateChain: string(chain),\n        Type:             \"custom\",\n    }\n\n    certObj, _, err := client.Certificates.Create(ctx, createRequest)\n}"
      - lang: Ruby
        source: "require 'droplet_kit'\ntoken = ENV['DIGITALOCEAN_TOKEN']\nclient = DropletKit::Client.new(access_token: token)\n\nkey = File.open('/path/to/privkey1.pem', 'r'){ |file| file.read }\ncert = File.open('/path/to/cert1.pem', 'r'){ |file| file.read }\nchain = File.open('/path/to/fullchain1.pem', 'r'){ |file| file.read }\n\ncertificate = DropletKit::Certificate.new(\n    name: 'web-cert-01',\n    private_key: key,\n    leaf_certificate: cert,\n    certificate_chain: chain,\n    type: 'custom'\n)\n\nclient.certificates.create(certificate)"
      - lang: Python
