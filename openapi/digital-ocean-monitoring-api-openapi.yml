      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                destination_uuid:
                  type: string
                  example: 9df2b7e9-3fb2-4577-b60a-e9c0d53f9a99
                  description: A unique identifier for an already-existing destination.
                resources:
