      description: "To create a new sink, send a POST request to `/v2/monitoring/sinks`. Forwards logs from the \nresources identified in `resources` to the specified pre-existing destination.\n"
      tags:
      - Monitoring
      responses:
        '202':
          $ref: '#/components/responses/accepted'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
