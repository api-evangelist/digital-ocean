    name: DigitalOcean API Team
    email: api-engineering@digitalocean.com
  termsOfService: https://www.digitalocean.com/legal/terms-of-service-agreement/
servers:
- url: https://api.digitalocean.com
  description: production
security:
- bearer_auth: []
tags:
- name: Droplet Autoscale Pools
  description: Droplet autoscale pools manage automatic horizontal scaling for your applications based on resource usage (CPU, memory, or both) or a static configuration.
paths:
  /v2/droplets/autoscale:
    get:
      operationId: autoscalepools_list
      summary: List All Autoscale Pools
      description: 'To list all autoscale pools in your team, send a GET request to `/v2/droplets/autoscale`.

        The response body will be a JSON object with a key of `autoscale_pools` containing an array of autoscale pool objects.

        These each contain the standard autoscale pool attributes.

        '
      tags:
      - Droplet Autoscale Pools
      parameters:
      - $ref: '#/components/parameters/per_page'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/autoscale_pool_name'
      responses:
        '200':
          $ref: '#/components/responses/all_autoscale_pools'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/droplets/autoscale?page=1&per_page=1\""
      security:
      - bearer_auth:
        - droplet:read
    post:
      operationId: autoscalepools_create
      summary: Create a New Autoscale Pool
      description: 'To create a new autoscale pool, send a POST request to `/v2/droplets/autoscale` setting the required attributes.


        The response body will contain a JSON object with a key called `autoscale_pool` containing the standard attributes for the new autoscale pool.

        '
      tags:
      - Droplet Autoscale Pools
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/autoscale_pool_create'
            examples:
              Autoscale Create Request Dynamic Config:
                $ref: '#/components/examples/autoscale_create_request_dynamic'
              Autoscale Create Request Static Config:
                $ref: '#/components/examples/autoscale_create_request_static'
      responses:
        '202':
          $ref: '#/components/responses/autoscale_pool_create'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\n    \"name\": \"test-autoscalergroup\",\n    \"config\": {\n      \"min_instances\": 1,\n      \"max_instances\": 5,\n      \"target_cpu_utilization\": 0.5,\n      \"cooldown_minutes\": 5\n    },\n    \"droplet_template\": {\n      \"size\": \"c-2\",\n      \"region\": \"tor1\",\n      \"image\": \"ubuntu-20-04-x64\",\n      \"tags\": [\n        \"test-ag-01\"\n      ],\n      \"ssh_keys\": [\n        \"392594\",\n        \"385255\"\n      ],\n      \"vpc_uuid\": \"c472520a-831e-4770-8135-542c57a69daa\",\n      \"ipv6\": true,\n      \"user_data\": \"\\n#cloud-config\\nruncmd:\\n- apt-get update\\n\"\n    }\n  }' \\\n  \"https://api.digitalocean.com/v2/droplets/autoscale\""
      security:
      - bearer_auth:
        - droplet:create
  /v2/droplets/autoscale/{autoscale_pool_id}:
    get:
      operationId: autoscalepools_get
      summary: Retrieve an Existing Autoscale Pool
      description: 'To show information about an individual autoscale pool, send a GET request to

        `/v2/droplets/autoscale/$AUTOSCALE_POOL_ID`.

        '
      tags:
      - Droplet Autoscale Pools
      parameters:
      - $ref: '#/components/parameters/autoscale_pool_id'
      responses:
        '200':
          $ref: '#/components/responses/existing_autoscale_pool'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/droplets/autoscale/880fee37-d07a-4f94-94a0-f07d9fc7bbb4\""
      security:
      - bearer_auth:
        - droplet:read
    put:
      operationId: autoscalepools_update
      summary: Update Autoscale Pool
      description: "To update the configuration of an existing autoscale pool, send a PUT request to\n`/v2/droplets/autoscale/$AUTOSCALE_POOL_ID`. The request must contain a full representation\nof the autoscale pool including existing attributes. \n"
      tags:
      - Droplet Autoscale Pools
      parameters:
      - $ref: '#/components/parameters/autoscale_pool_id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/autoscale_pool_create'
            examples:
              Autoscale Update Request:
                $ref: '#/components/examples/autoscale_update_request'
      responses:
        '200':
          $ref: '#/components/responses/autoscale_pool_create'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X PUT \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\n    \"name\": \"test-autoscalergroup-01\",\n    \"config\": {\n      \"min_instances\": 1,\n      \"max_instances\": 5,\n      \"target_cpu_utilization\": 0.5,\n      \"cooldown_minutes\": 10\n    },\n    \"droplet_template\": {\n      \"size\": \"c-2\",\n      \"region\": \"tor1\",\n      \"image\": \"ubuntu-20-04-x64\",\n      \"tags\": [\n        \"test-ag-01\"\n      ],\n      \"ssh_keys\": [\n        \"372862\",\n        \"367582\",\n        \"355790\"\n      ],\n      \"vpc_uuid\": \"4637280e-3842-4661-a628-a6f0392959d3\",\n      \"with_droplet_agent\": true,\n      \"ipv6\": true,\n      \"user_data\": \"\\n#cloud-config\\nruncmd:\\n- apt-get update\\n\"\n    }\n  }' \\\n  \"https://api.digitalocean.com/v2/droplets/autoscale/d0067f19-c9bd-4d8c-b28b-e464fd1fb250\""
      security:
      - bearer_auth:
        - droplet:create
    delete:
      operationId: autoscalepools_delete
      summary: Delete autoscale pool
      description: "To destroy an autoscale pool, send a DELETE request to the `/v2/droplets/autoscale/$AUTOSCALE_POOL_ID` endpoint.\n\nA successful response will include a 202 response code and no content. \n"
      tags:
      - Droplet Autoscale Pools
      parameters:
      - $ref: '#/components/parameters/autoscale_pool_id'
      responses:
        '202':
          $ref: '#/components/responses/no_content'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X DELETE \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/droplets/autoscale/880fee37-d07a-4f94-94a0-f07d9fc7bbb4\""
      security:
      - bearer_auth:
        - droplet:delete
  /v2/droplets/autoscale/{autoscale_pool_id}/dangerous:
    delete:
      operationId: autoscalepools_delete_dangerous
      summary: Delete autoscale pool and resources
      description: 'To destroy an autoscale pool and its associated resources (Droplets),

        send a DELETE request to the `/v2/droplets/autoscale/$AUTOSCALE_POOL_ID/dangerous` endpoint.

        '
      tags:
      - Droplet Autoscale Pools
      parameters:
      - $ref: '#/components/parameters/autoscale_pool_id'
      - $ref: '#/components/parameters/parameters_x_dangerous'
      responses:
        '202':
          $ref: '#/components/responses/no_content'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
