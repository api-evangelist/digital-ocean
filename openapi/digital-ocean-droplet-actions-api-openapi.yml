  /v2/droplets/actions:
    post:
      operationId: dropletActions_post_byTag
      summary: Acting on Tagged Droplets
      description: 'Some actions can be performed in bulk on tagged Droplets. The actions can be

        initiated by sending a POST to `/v2/droplets/actions?tag_name=$TAG_NAME` with

        the action arguments.


        Only a sub-set of action types are supported:


        - `power_cycle`

        - `power_on`

        - `power_off`

        - `shutdown`

        - `enable_ipv6`

        - `enable_backups`

        - `disable_backups`

        - `snapshot`

        '
      tags:
      - Droplet Actions
      parameters:
      - $ref: '#/components/parameters/droplet_tag_name'
      requestBody:
        description: 'The `type` attribute set in the request body will specify the  action that

          will be taken on the Droplet. Some actions will require additional

          attributes to be set as well.

          '
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/droplet_action'
              - $ref: '#/components/schemas/droplet_action_snapshot'
              discriminator:
                propertyName: type
                mapping:
                  enable_backups: '#/components/schemas/droplet_action'
                  disable_backups: '#/components/schemas/droplet_action'
                  power_cycle: '#/components/schemas/droplet_action'
                  shutdown: '#/components/schemas/droplet_action'
                  power_off: '#/components/schemas/droplet_action'
                  power_on: '#/components/schemas/droplet_action'
                  enable_ipv6: '#/components/schemas/droplet_action'
                  snapshot: '#/components/schemas/droplet_action_snapshot'
      responses:
        '201':
          $ref: '#/components/responses/droplet_actions_response'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\"type\":\"enable_backups\"}' \\\n  \"https://api.digitalocean.com/v2/droplets/actions?tag_name=awesome\""
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    action, _, err := client.DropletActions.PowerOffByTag(ctx, \"awesome\")\n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          client.droplet_actions.power_off_for_tag(tag: ''awesome'')'
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          req = {

          "type": "enable_backups"

          }


          resp = client.droplet_actions.post_by_tag(tag_name="production",body=req)'
      security:
      - bearer_auth:
        - droplet:update
  /v2/droplets/{droplet_id}/actions/{action_id}:
    get:
      operationId: dropletActions_get
      summary: Retrieve a Droplet Action
      description: 'To retrieve a Droplet action, send a GET request to

        `/v2/droplets/$DROPLET_ID/actions/$ACTION_ID`.


        The response will be a JSON object with a key called `action`. The value will

        be a Droplet action object.

        '
      tags:
      - Droplet Actions
      parameters:
      - $ref: '#/components/parameters/droplet_id'
      - $ref: '#/components/parameters/action_id'
      responses:
        '200':
          $ref: '#/components/responses/action'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/droplets/3164444/actions/36804807\""
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    action, _, err := client.DropletActions.Get(ctx, 3164450, 36804807)\n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          client.droplet_actions.find(droplet_id: 3164444, id: 36804807)'
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.droplet_actions.get(droplet_id=3934132, action_id=2432342)'
      security:
      - bearer_auth:
        - droplet:read
components:
  schemas:
    droplet_action_enable_backups:
      allOf:
      - $ref: '#/components/schemas/droplet_action'
      - type: object
        properties:
          backup_policy:
            allOf:
            - $ref: '#/components/schemas/droplet_backup_policy'
            - description: An object specifying the backup policy for the Droplet. If omitted, the backup plan will default to daily.
      example:
        type: enable_backups
        backup_policy:
          plan: daily
          hour: 20
    droplet_action_rename:
      allOf:
      - $ref: '#/components/schemas/droplet_action'
      - type: object
        properties:
          name:
            type: string
            example: nifty-new-name
            description: The new name for the Droplet.
    link_to_prev_page:
      type: object
      properties:
        prev:
          description: URI of the previous page of the results.
          type: string
          example: https://api.digitalocean.com/v2/images?page=1
    link_to_last_page:
      type: object
      properties:
        last:
          description: URI of the last page of the results.
          type: string
          example: https://api.digitalocean.com/v2/images?page=2
    page_links:
      type: object
      properties:
        pages:
          anyOf:
          - $ref: '#/components/schemas/forward_links'
          - $ref: '#/components/schemas/backward_links'
          - {}
          example:
            pages:
              first: https://api.digitalocean.com/v2/account/keys?page=1
              prev: https://api.digitalocean.com/v2/account/keys?page=2
    action:
      type: object
      properties:
        id:
          type: integer
          description: A unique numeric ID that can be used to identify and reference an action.
          example: 36804636
        status:
          type: string
          description: The current status of the action. This can be "in-progress", "completed", or "errored".
          enum:
          - in-progress
          - completed
          - errored
          example: completed
          default: in-progress
        type:
          type: string
          description: This is the type of action that the object represents. For example, this could be "transfer" to represent the state of an image transfer action.
          example: create
        started_at:
          type: string
          format: date-time
          description: A time value given in ISO8601 combined date and time format that represents when the action was initiated.
          example: '2020-11-14T16:29:21Z'
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: A time value given in ISO8601 combined date and time format that represents when the action was completed.
          example: '2020-11-14T16:30:06Z'
        resource_id:
          type: integer
          nullable: true
          description: A unique identifier for the resource that the action is associated with.
          example: 3164444
        resource_type:
          type: string
          description: The type of resource that the action is associated with.
          example: droplet
        region:
          $ref: '#/components/schemas/region'
        region_slug:
          type: string
          nullable: true
          description: A human-readable string that is used as a unique identifier for each region.
          example: nyc3
    droplet_action_snapshot:
      allOf:
      - $ref: '#/components/schemas/droplet_action'
      - type: object
        properties:
          name:
            type: string
            example: Nifty New Snapshot
            description: The name to give the new snapshot of the Droplet.
    droplet_action_change_kernel:
      allOf:
      - $ref: '#/components/schemas/droplet_action'
      - type: object
        properties:
          kernel:
            type: integer
            example: 12389723
            description: A unique number used to identify and reference a specific kernel.
    droplet_action:
      required:
      - type
      type: object
      description: Specifies the action that will be taken on the Droplet.
      properties:
        type:
          type: string
          enum:
          - enable_backups
          - disable_backups
          - reboot
          - power_cycle
          - shutdown
          - power_off
          - power_on
          - restore
          - password_reset
          - resize
          - rebuild
          - rename
          - change_kernel
          - enable_ipv6
          - snapshot
          example: reboot
          description: The type of action to initiate for the Droplet.
    forward_links:
      allOf:
      - $ref: '#/components/schemas/link_to_last_page'
      - $ref: '#/components/schemas/link_to_next_page'
    region:
      type: object
      properties:
        name:
          type: string
          description: The display name of the region.  This will be a full name that is used in the control panel and other interfaces.
          example: New York 3
        slug:
          type: string
          description: A human-readable string that is used as a unique identifier for each region.
          example: nyc3
        features:
          items:
            type: string
          description: This attribute is set to an array which contains features available in this region
          example:
          - private_networking
          - backups
          - ipv6
          - metadata
          - install_agent
          - storage
          - image_transfer
        available:
          type: boolean
          description: This is a boolean value that represents whether new Droplets can be created in this region.
          example: true
        sizes:
          items:
            type: string
          description: This attribute is set to an array which contains the identifying slugs for the sizes available in this region.
          example:
