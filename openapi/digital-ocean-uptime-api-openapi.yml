    url: https://www.apache.org/licenses/LICENSE-2.0.html
  contact:
    name: DigitalOcean API Team
    email: api-engineering@digitalocean.com
  termsOfService: https://www.digitalocean.com/legal/terms-of-service-agreement/
servers:
- url: https://api.digitalocean.com
  description: production
security:
- bearer_auth: []
tags:
- name: Uptime
  description: '[DigitalOcean Uptime Checks](https://docs.digitalocean.com/products/uptime/) provide the ability to monitor your endpoints from around the world, and alert you when they''re slow, unavailable, or SSL certificates are expiring.

    To interact with Uptime, you will generally send requests to the Uptime endpoint at `/v2/uptime/`.'
paths:
  /v2/uptime/checks:
    get:
      operationId: uptime_list_checks
      summary: List All Checks
      description: To list all of the Uptime checks on your account, send a GET request to `/v2/uptime/checks`.
      tags:
      - Uptime
      parameters:
      - $ref: '#/components/parameters/per_page'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          $ref: '#/components/responses/all_checks'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/uptime/checks\""
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.uptime.checks_list()'
      security:
      - bearer_auth:
        - uptime:read
    post:
      operationId: uptime_create_check
      summary: Create a New Check
      description: 'To create an Uptime check, send a POST request to `/v2/uptime/checks` specifying the attributes

        in the table below in the JSON body.

        '
      tags:
      - Uptime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              allOf:
              - $ref: '#/components/schemas/check_updatable'
              required:
              - name
              - method
              - target
              - regions
              - type
              - enabled
      responses:
        '201':
          $ref: '#/components/responses/existing_check'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\"name\":\"Landing page check\",\"type\":\"https\",\"target\":\"https://www.landingpage.com\",\"regions\":[\"us_east\",\"eu_west\"],\"enabled\":true}' \\\n  \"https://api.digitalocean.com/v2/uptime/checks\""
      - lang: Python
        source: "import os\nfrom pydo import Client\n\nclient = Client(token=os.environ.get(\"DIGITALOCEAN_TOKEN\"))\n\nreq = {\n  \"name\": \"Landing page check\",\n  \"type\": \"https\",\n  \"target\": \"https://www.landingpage.com\",\n  \"regions\": [\n    \"us_east\",\n    \"eu_west\"\n  ],\n  \"enabled\": True\n}\n\nresp = client.uptime.check_create(body=req)"
      security:
      - bearer_auth:
        - uptime:create
  /v2/uptime/checks/{check_id}:
    get:
      operationId: uptime_get_check
      summary: Retrieve an Existing Check
      description: To show information about an existing check, send a GET request to `/v2/uptime/checks/$CHECK_ID`.
      tags:
      - Uptime
      parameters:
      - $ref: '#/components/parameters/check_id'
      responses:
        '200':
          $ref: '#/components/responses/existing_check'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/uptime/checks/{check_id}\""
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.uptime.check_get(check_id="fd9dfa")'
      security:
      - bearer_auth:
        - uptime:read
    put:
      operationId: uptime_update_check
      summary: Update a Check
      description: 'To update the settings of an Uptime check, send a PUT request to `/v2/uptime/checks/$CHECK_ID`.

        '
      tags:
      - Uptime
      parameters:
      - $ref: '#/components/parameters/check_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              allOf:
              - $ref: '#/components/schemas/check_updatable'
      responses:
        '200':
          $ref: '#/components/responses/existing_check'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X PUT \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\"name\":\"Landing page check\",\"type\":\"https\",\"target\":\"https://www.newlandingpage.com\",\"regions\":[\"us_east\",\"eu_west\"],\"enabled\":true}' \\\n  \"https://api.digitalocean.com/v2/uptime/checks/{check_id}\""
      - lang: Python
        source: "import os\nfrom pydo import Client\n\nclient = Client(token=os.environ.get(\"DIGITALOCEAN_TOKEN\"))\n\nreq = {\n  \"name\": \"Landing page check\",\n  \"type\": \"https\",\n  \"target\": \"https://www.landingpage.com\",\n  \"regions\": [\n    \"us_east\",\n    \"eu_west\"\n  ],\n  \"enabled\": True\n}\n\nresp = client.uptime.check_update(check_id=\"fd9fda\", body=req)"
      security:
      - bearer_auth:
        - uptime:update
    delete:
      operationId: uptime_delete_check
      summary: Delete a Check
      description: 'To delete an Uptime check, send a DELETE request to `/v2/uptime/checks/$CHECK_ID`. A 204 status

        code with no body will be returned in response to a successful request.



        Deleting a check will also delete alerts associated with the check.

        '
      tags:
      - Uptime
      parameters:
      - $ref: '#/components/parameters/check_id'
      responses:
        '204':
          $ref: '#/components/responses/no_content'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X DELETE \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/uptime/checks/{check_id}\""
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.uptime.check_delete(check_id="fd9dfa")'
      security:
      - bearer_auth:
        - uptime:delete
  /v2/uptime/checks/{check_id}/state:
    get:
      operationId: uptime_get_checkState
      summary: Retrieve Check State
      description: To show information about an existing check's state, send a GET request to `/v2/uptime/checks/$CHECK_ID/state`.
      tags:
      - Uptime
      parameters:
      - $ref: '#/components/parameters/check_id'
      responses:
        '200':
          $ref: '#/components/responses/existing_check_state'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/uptime/checks/{check_id}/state\""
      - lang: Python
        source: 'import os

          from pydo import Client


