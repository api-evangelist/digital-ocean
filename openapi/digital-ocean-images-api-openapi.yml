servers:
- url: https://api.digitalocean.com
  description: production
security:
- bearer_auth: []
tags:
- name: Images
  description: 'A DigitalOcean [image](https://docs.digitalocean.com/products/images/) can be

    used to create a Droplet and may come in a number of flavors. Currently,

    there are five types of images: snapshots, backups, applications,

    distributions, and custom images.


    * [Snapshots](https://docs.digitalocean.com/products/snapshots/) provide

    a full copy of an existing Droplet instance taken on demand.


    * [Backups](https://docs.digitalocean.com/products/backups/) are similar

    to snapshots but are created automatically at regular intervals when

    enabled for a Droplet.


    * [Custom images](https://docs.digitalocean.com/products/custom-images/)

    are Linux-based virtual machine images (raw, qcow2, vhdx, vdi, and vmdk

    formats are supported) that you may upload for use on DigitalOcean.


    * Distributions are the public Linux distributions that are available to

    be used as a base to create Droplets.


    * Applications, or [1-Click Apps](https://docs.digitalocean.com/products/marketplace/),

    are distributions pre-configured with additional software.


    To interact with images, you will generally send requests to the images

    endpoint at /v2/images.'
paths:
  /v2/images:
    get:
      operationId: images_list
      summary: List All Images
      description: 'To list all of the images available on your account, send a GET request to /v2/images.


        ## Filtering Results

        -----


        It''s possible to request filtered results by including certain query parameters.


        **Image Type**


        Either 1-Click Application or OS Distribution images can be filtered by using the `type` query parameter.


        > Important: The `type` query parameter does not directly relate to the `type` attribute.


        To retrieve only ***distribution*** images, include the `type` query parameter set to distribution, `/v2/images?type=distribution`.


        To retrieve only ***application*** images, include the `type` query parameter set to application, `/v2/images?type=application`.


        **User Images**


        To retrieve only the private images of a user, include the `private` query parameter set to true, `/v2/images?private=true`.


        **Tags**


        To list all images assigned to a specific tag, include the `tag_name` query parameter set to the name of the tag in your GET request. For example, `/v2/images?tag_name=$TAG_NAME`.

        '
      tags:
      - Images
      parameters:
      - $ref: '#/components/parameters/type'
      - $ref: '#/components/parameters/private'
      - $ref: '#/components/parameters/tag'
      - $ref: '#/components/parameters/per_page'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          $ref: '#/components/responses/all_images'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/images?page=1&per_page=1\""
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    opt := &godo.ListOptions{\n        Page:    1,\n        PerPage: 200,\n    }\n\n    // List all images\n    images, _, err := client.Images.List(ctx, opt)\n\n    // List all application images\n    opt := &godo.ListOptions{\n        Page:    1,\n        PerPage: 200,\n    }\n\n    images, _, err := client.Images.ListApplication(ctx, opt) \n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          # List all images

          images = client.images.all

          images.each


          # List all application images

          images = client.images.all(type: ''application'')

          images.each'
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.images.list()'
      security:
      - bearer_auth:
        - image:read
    post:
      operationId: images_create_custom
      summary: Create a Custom Image
      description: "To create a new custom image, send a POST request to /v2/images.\nThe body must contain a url attribute pointing to a Linux virtual machine\nimage to be imported into DigitalOcean.\nThe image must be in the raw, qcow2, vhdx, vdi, or vmdk format.\nIt may be compressed using gzip or bzip2 and must be smaller than 100 GB after\n being decompressed.\n"
      tags:
      - Images
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/image_new_custom'
      responses:
        '202':
          $ref: '#/components/responses/new_custom_image'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\"name\": \"ubuntu-18.04-minimal\", \"url\": \"http://cloud-images.ubuntu.com/minimal/releases/bionic/release/ubuntu-18.04-minimal-cloudimg-amd64.img\", \"distribution\": \"Ubuntu\", \"region\": \"nyc3\", \"description\": \"Cloud-optimized image w/ small footprint\", \"tags\":[\"base-image\", \"prod\"]}' \\\n  \"https://api.digitalocean.com/v2/images\""
      - lang: Python
        source: "import os\nfrom pydo import Client\n\nclient = Client(token=os.environ.get(\"DIGITALOCEAN_TOKEN\"))\n\nreq = {\n  \"name\": \"ubuntu-18.04-minimal\",\n  \"url\": \"http://cloud-images.ubuntu.com/minimal/releases/bionic/release/ubuntu-18.04-minimal-cloudimg-amd64.img\",\n  \"distribution\": \"Ubuntu\",\n  \"region\": \"nyc3\",\n  \"description\": \"Cloud-optimized image w/ small footprint\",\n  \"tags\": [\n    \"base-image\",\n    \"prod\"\n  ]\n}\n\nresp = client.images.create_custom(body=req)"
      security:
      - bearer_auth:
        - image:create
  /v2/images/{image_id}:
    get:
      operationId: images_get
      summary: Retrieve an Existing Image
      description: 'To retrieve information about an image, send a `GET` request to

        `/v2/images/$IDENTIFIER`.

        '
      tags:
      - Images
      parameters:
      - in: path
        name: image_id
        description: 'A unique number (id) or string (slug) used to identify and reference a

          specific image.


          **Public** images can be identified by image `id` or `slug`.


          **Private** images *must* be identified by image `id`.

          '
        required: true
        schema:
          anyOf:
          - type: integer
          - type: string
        examples:
          byId:
            summary: Retrieve a public or private image by id
            value: 62137902
          bySlug:
            summary: Retrieve a public image by slug
            value: ubuntu-16-04-x64
      responses:
        '200':
          $ref: '#/components/responses/existing_image'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "# Get existing image by ID\ncurl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/images/7555620\"\n\n# Get existing image by slug\ncurl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/images/ubuntu-16-04-x64\""
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    // Get existing image by ID\n    image, _, err := client.Images.GetByID(ctx, 7555620)\n\n    // Get existing image by slug\n    // image, _, err := client.Images.GetBySlug(ctx, \"ubuntu-16-04-x64\") \n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          # Retrieve image by ID

          client.images.find(id: ''7555620'')


          # Retrieve image by slug

          client.images.find(id: ''ubuntu-16-04-x64'')'
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.images.get(image_id=134215)'
      security:
      - bearer_auth:
        - image:read
    put:
      operationId: images_update
      summary: Update an Image
      description: 'To update an image, send a `PUT` request to `/v2/images/$IMAGE_ID`.

        Set the `name` attribute to the new value you would like to use.

        For custom images, the `description` and `distribution` attributes may also be updated.

        '
      tags:
      - Images
      parameters:
      - $ref: '#/components/parameters/image_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/image_update'
      responses:
        '200':
          $ref: '#/components/responses/updated_image'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X PUT \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\"name\":\"new-image-name\"}' \\\n  \"https://api.digitalocean.com/v2/images/7938391\""
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    updateRequest := &godo.ImageUpdateRequest{\n        Name: \"new-image-name\",\n    }\n\n    image, _, err := client.Images.Update(ctx, id, updateRequest)\n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          image = DropletKit::Image.new(name: ''new-image-name'')

          client.images.update(image, id: 7938391)'
      - lang: Python
        source: "import os\nfrom pydo import Client\n\nclient = Client(token=os.environ.get(\"DIGITALOCEAN_TOKEN\"))\n\nreq = {\n  \"name\": \"Nifty New Snapshot\",\n  \"distribution\": \"Ubuntu\",\n  \"description\": \" \"\n}\n\nresp = client.images.update(image_id=234532, body=req)"
      security:
      - bearer_auth:
        - image:update
    delete:
      operationId: images_delete
      summary: Delete an Image
      description: 'To delete a snapshot or custom image, send a `DELETE` request to `/v2/images/$IMAGE_ID`.

        '
      tags:
      - Images
      parameters:
      - $ref: '#/components/parameters/image_id'
      responses:
        '204':
          $ref: '#/components/responses/no_content'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X DELETE \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/images/7938391\""
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    _, err := client.Images.Delete(ctx, 7938391)\n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          client.images.delete(id: 7938391)'
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.images.delete(image_id=134215)'
      security:
      - bearer_auth:
        - image:delete
components:
  schemas:
    distribution:
      type: string
      description: The name of a custom image's distribution. Currently, the valid values are  `Arch Linux`, `CentOS`, `CoreOS`, `Debian`, `Fedora`, `Fedora Atomic`,  `FreeBSD`, `Gentoo`, `openSUSE`, `RancherOS`, `Rocky Linux`, `Ubuntu`, and `Unknown`.  Any other value will be accepted but ignored, and `Unknown` will be used in its place.
      enum:
      - Arch Linux
      - CentOS
      - CoreOS
      - Debian
      - Fedora
      - Fedora Atomic
      - FreeBSD
      - Gentoo
      - openSUSE
      - RancherOS
      - Rocky Linux
      - Ubuntu
      - Unknown
      example: Ubuntu
    regions_array:
      type: array
      items:
        $ref: '#/components/schemas/region_slug'
      description: This attribute is an array of the regions that the image is available in. The regions are represented by their identifying slug values.
      example:
      - nyc1
      - nyc2
    link_to_prev_page:
      type: object
      properties:
        prev:
          description: URI of the previous page of the results.
          type: string
          example: https://api.digitalocean.com/v2/images?page=1
    page_links:
      type: object
      properties:
        pages:
          anyOf:
          - $ref: '#/components/schemas/forward_links'
          - $ref: '#/components/schemas/backward_links'
          - {}
          example:
            pages:
              first: https://api.digitalocean.com/v2/account/keys?page=1
              prev: https://api.digitalocean.com/v2/account/keys?page=2
    link_to_last_page:
      type: object
      properties:
        last:
          description: URI of the last page of the results.
          type: string
          example: https://api.digitalocean.com/v2/images?page=2
    region_slug:
      type: string
      description: The slug identifier for the region where the resource will initially be  available.
      enum:
      - ams1
      - ams2
      - ams3
      - blr1
      - fra1
      - lon1
      - nyc1
      - nyc2
      - nyc3
      - sfo1
      - sfo2
      - sfo3
      - sgp1
      - tor1
      - syd1
      example: nyc3
    forward_links:
      allOf:
      - $ref: '#/components/schemas/link_to_last_page'
      - $ref: '#/components/schemas/link_to_next_page'
    image_new_custom:
      type: object
      allOf:
      - $ref: '#/components/schemas/image_update'
      - properties:
          url:
            type: string
            description: A URL from which the custom Linux virtual machine image may be retrieved.  The image it points to must be in the raw, qcow2, vhdx, vdi, or vmdk format.  It may be compressed using gzip or bzip2 and must be smaller than 100 GB after being decompressed.
            example: http://cloud-images.ubuntu.com/minimal/releases/bionic/release/ubuntu-18.04-minimal-cloudimg-amd64.img
          region:
            $ref: '#/components/schemas/region_slug'
          tags:
            $ref: '#/components/schemas/tags_array'
      required:
      - name
      - url
      - region
      example:
        name: ubuntu-18.04-minimal
        url: http://cloud-images.ubuntu.com/minimal/releases/bionic/release/ubuntu-18.04-minimal-cloudimg-amd64.img
        distribution: Ubuntu
        region: nyc3
        description: Cloud-optimized image w/ small footprint
        tags:
        - base-image
        - prod
    image_description:
      type: string
      description: An optional free-form text field to describe an image.
      example: ' '
    pagination:
      type: object
      properties:
        links:
          $ref: '#/components/schemas/page_links'
    link_to_first_page:
      type: object
      properties:
        first:
          description: URI of the first page of the results.
          type: string
          example: https://api.digitalocean.com/v2/images?page=1
    error:
      type: object
      properties:
        id:
          description: A short identifier corresponding to the HTTP status code returned. For  example, the ID for a response returning a 404 status code would be "not_found."
          type: string
          example: not_found
        message:
          description: A message providing additional information about the error, including  details to help resolve it when possible.
          type: string
          example: The resource you were accessing could not be found.
        request_id:
          description: Optionally, some endpoints may include a request ID that should be  provided when reporting bugs or opening support tickets to help  identify the issue.
          type: string
          example: 4d9d8375-3c56-4925-a3e7-eb137fed17e9
      required:
      - id
      - message
    backward_links:
      allOf:
      - $ref: '#/components/schemas/link_to_first_page'
      - $ref: '#/components/schemas/link_to_prev_page'
    image_name:
      type: string
      description: The display name that has been given to an image.  This is what is shown in the control panel and is generally a descriptive title for the image in question.
      example: Nifty New Snapshot
    meta_properties:
      type: object
      description: Information about the response itself.
      properties:
        total:
          description: Number of objects returned by the request.
          type: integer
          example: 1
    meta:
      type: object
      properties:
        meta:
          allOf:
          - $ref: '#/components/schemas/meta_properties'
          - required:
            - total
      required:
      - meta
    image:
      type: object
      properties:
        id:
          type: integer
          description: A unique number that can be used to identify and reference a specific image.
          example: 7555620
          readOnly: true
        name:
          $ref: '#/components/schemas/image_name'
        type:
          type: string
          description: Describes the kind of image. It may be one of `base`, `snapshot`, `backup`, `custom`, or `admin`. Respectively, this specifies whether an image is a DigitalOcean base OS image, user-generated Droplet snapshot, automatically created Droplet backup, user-provided virtual machine image, or an image used for DigitalOcean managed resources (e.g. DOKS worker nodes).
          enum:
          - base
          - snapshot
          - backup
          - custom
          - admin
          example: snapshot
        distribution:
          $ref: '#/components/schemas/distribution'
        slug:
          type: string
          nullable: true
          description: A uniquely identifying string that is associated with each of the DigitalOcean-provided public images. These can be used to reference a public image as an alternative to the numeric id.
          example: nifty1
        public:
          type: boolean
          description: This is a boolean value that indicates whether the image in question is public or not. An image that is public is available to all accounts. A non-public image is only accessible from your account.
          example: true
        regions:
          $ref: '#/components/schemas/regions_array'
        created_at:
          type: string
          format: date-time
          description: A time value given in ISO8601 combined date and time format that represents when the image was created.
          example: '2020-05-04T22:23:02Z'
        min_disk_size:
          type: integer
          description: The minimum disk size in GB required for a Droplet to use this image.
          example: 20
          nullable: true
          minimum: 0
        size_gigabytes:
          type: number
          format: float
          nullable: true
          description: The size of the image in gigabytes.
          example: 2.34
        description:
          $ref: '#/components/schemas/image_description'
        tags:
          $ref: '#/components/schemas/tags_array'
        status:
          type: string
          description: "A status string indicating the state of a custom image. This may be `NEW`,\n `available`, `pending`, `deleted`, or `retired`."
          enum:
          - NEW
          - available
          - pending
          - deleted
          - retired
          example: NEW
        error_message:
          type: string
          description: "A string containing information about errors that may occur when importing\n a custom image."
          example: ' '
    link_to_next_page:
      type: object
      properties:
        next:
          description: URI of the next page of the results.
          type: string
          example: https://api.digitalocean.com/v2/images?page=2
    tags_array:
      type: array
      items:
        type: string
      nullable: true
      description: A flat array of tag names as strings to be applied to the resource. Tag names may be for either existing or new tags.
      example:
      - base-image
      - prod
    image_update:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/image_name'
        distribution:
          $ref: '#/components/schemas/distribution'
        description:
          $ref: '#/components/schemas/image_description'
