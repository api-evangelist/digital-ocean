  contact:
    name: DigitalOcean API Team
    email: api-engineering@digitalocean.com
  termsOfService: https://www.digitalocean.com/legal/terms-of-service-agreement/
servers:
- url: https://api.digitalocean.com
  description: production
security:
- bearer_auth: []
tags:
- name: Container Registry
  description: 'DigitalOcean offers the ability for you to create a

    [private container registry](https://docs.digitalocean.com/products/container-registry/)

    to store your Docker images for use with your Kubernetes clusters. This

    container registry runs inside the same datacenters as your cluster,

    ensuring reliable and performant rollout of image deployments.


    You can only create one registry per DigitalOcean account, but you can use

    that registry to create as many repositories as you wish.'
paths:
  /v2/registry:
    get:
      operationId: registry_get
      summary: Get Container Registry Information
      description: To get information about your container registry, send a GET request to `/v2/registry`.
      tags:
      - Container Registry
      responses:
        '200':
          $ref: '#/components/responses/registry_info'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/registry\""
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.registry.get()'
      security:
      - bearer_auth:
        - registry:read
    post:
      operationId: registry_create
      summary: Create Container Registry
      description: 'To create your container registry, send a POST request to `/v2/registry`.


        The `name` becomes part of the URL for images stored in the registry. For

        example, if your registry is called `example`, an image in it will have the

        URL `registry.digitalocean.com/example/image:tag`.

        '
      tags:
      - Container Registry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/registry_create'
      responses:
        '201':
          $ref: '#/components/responses/registry_info'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\"name\": \"example\", \"subscription_tier_slug\": \"basic\", \"region\": \"fra1\"}' \\\n  \"https://api.digitalocean.com/v2/registry\""
      - lang: Python
        source: "import os\nfrom pydo import Client\n\nclient = Client(token=os.environ.get(\"DIGITALOCEAN_TOKEN\"))\n\nreq = {\n  \"name\": \"example\",\n  \"subscription_tier_slug\": \"basic\",\n  \"region\": \"fra1\"\n}\n\nresp = client.registry.create(body=req)"
      security:
      - bearer_auth:
        - registry:create
    delete:
      operationId: registry_delete
      summary: Delete Container Registry
      description: To delete your container registry, destroying all container image data stored in it, send a DELETE request to `/v2/registry`.
      tags:
      - Container Registry
      responses:
        '204':
          $ref: '#/components/responses/no_content'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X DELETE \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/registry\""
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.registry.delete()'
      security:
      - bearer_auth:
        - registry:delete
  /v2/registry/subscription:
    get:
      operationId: registry_get_subscription
      summary: Get Subscription Information
      description: A subscription is automatically created when you configure your container registry. To get information about your subscription, send a GET request to `/v2/registry/subscription`.
      tags:
      - Container Registry
      responses:
        '200':
          $ref: '#/components/responses/subscription_response'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/registry/subscription\""
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.registry.get_subscription()'
      security:
      - bearer_auth:
        - registry:read
    post:
      operationId: registry_update_subscription
      summary: Update Subscription Tier
      description: After creating your registry, you can switch to a different subscription tier to better suit your needs. To do this, send a POST request to `/v2/registry/subscription`.
      tags:
      - Container Registry
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tier_slug:
                  type: string
                  enum:
                  - starter
                  - basic
                  - professional
                  example: basic
                  description: The slug of the subscription tier to sign up for.
      responses:
        '200':
          $ref: '#/components/responses/subscription_response'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\"tier_slug\": \"professional\"}' \\\n  \"https://api.digitalocean.com/v2/registry/subscription\""
      - lang: Python
        source: "import os\nfrom pydo import Client\n\nclient = Client(token=os.environ.get(\"DIGITALOCEAN_TOKEN\"))\n\nreq = {\n  \"tier_slug\": \"basic\"\n}\n\nresp = client.registry.update_subscription(body=req)"
      security:
      - bearer_auth:
        - registry:update
  /v2/registry/docker-credentials:
    get:
      operationId: registry_get_dockerCredentials
      summary: Get Docker Credentials for Container Registry
      description: "In order to access your container registry with the Docker client or from a\nKubernetes cluster, you will need to configure authentication. The necessary\nJSON configuration can be retrieved by sending a GET request to\n`/v2/registry/docker-credentials`.\n\nThe response will be in the format of a Docker `config.json` file. To use the\nconfig in your Kubernetes cluster, create a Secret with:\n\n    kubectl create secret generic docr \\\n      --from-file=.dockerconfigjson=config.json \\\n      --type=kubernetes.io/dockerconfigjson\n\nBy default, the returned credentials have read-only access to your registry\nand cannot be used to push images. This is appropriate for most Kubernetes\nclusters. To retrieve read/write credentials, suitable for use with the Docker\nclient or in a CI system, read_write may be provided as query parameter. For\nexample: `/v2/registry/docker-credentials?read_write=true`\n\nBy default, the returned credentials will not expire. To retrieve credentials\nwith an expiry set, expiry_seconds may be provided as a query parameter. For\nexample: `/v2/registry/docker-credentials?expiry_seconds=3600` will return\ncredentials that expire after one hour.\n"
      tags:
      - Container Registry
      parameters:
      - $ref: '#/components/parameters/registry_expiry_seconds'
      - $ref: '#/components/parameters/registry_read_write'
      responses:
        '200':
          $ref: '#/components/responses/docker_credentials'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/registry/docker-credentials\""
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.registry.get_docker_credentials()'
      security:
      - bearer_auth:
        - registry:read
        - registry:update
  /v2/registry/validate-name:
    post:
      operationId: registry_validate_name
      summary: Validate a Container Registry Name
      description: 'To validate that a container registry name is available for use, send a POST

        request to `/v2/registry/validate-name`.


