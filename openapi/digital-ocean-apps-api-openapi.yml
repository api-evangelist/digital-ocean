            - apps-s-1vcpu-0.5gb
            - apps-s-1vcpu-1gb-fixed
            - apps-s-1vcpu-1gb
            - apps-s-1vcpu-2gb
            - apps-s-2vcpu-4gb
            - apps-d-1vcpu-0.5gb
            - apps-d-1vcpu-1gb
            - apps-d-1vcpu-2gb
            - apps-d-1vcpu-4gb
            - apps-d-2vcpu-4gb
            - apps-d-2vcpu-8gb
            - apps-d-4vcpu-8gb
