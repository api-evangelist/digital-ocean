  contact:
    name: DigitalOcean API Team
    email: api-engineering@digitalocean.com
  termsOfService: https://www.digitalocean.com/legal/terms-of-service-agreement/
servers:
- url: https://api.digitalocean.com
  description: production
security:
- bearer_auth: []
tags:
- name: Apps
  description: 'App Platform is a Platform-as-a-Service (PaaS) offering from DigitalOcean that allows

    developers to publish code directly to DigitalOcean servers without worrying about the

    underlying infrastructure.


    Most API operations are centered around a few core object types. Following are the

    definitions of these types. These definitions will be omitted from the operation-specific

    documentation.


    For documentation on app specifications (`AppSpec` objects), please refer to the

    [product documentation](https://docs.digitalocean.com/products/app-platform/reference/app-spec/)).'
paths:
  /v2/apps:
    get:
      operationId: apps_list
      summary: List All Apps
      description: List all apps on your account. Information about the current active deployment as well as any in progress ones will also be included for each app.
      tags:
      - Apps
      parameters:
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/per_page'
      - $ref: '#/components/parameters/with_projects'
      responses:
        '200':
          $ref: '#/components/responses/list_apps'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/apps\""
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          get_resp = client.apps.list()'
      security:
      - bearer_auth:
        - app:read
    post:
      operationId: apps_create
      summary: Create a New App
      description: Create a new app by submitting an app specification. For documentation on app specifications (`AppSpec` objects), please refer to [the product documentation](https://docs.digitalocean.com/products/app-platform/reference/app-spec/).
      tags:
      - Apps
      parameters:
      - $ref: '#/components/parameters/accept'
      - $ref: '#/components/parameters/content-type'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/apps_create_app_request'
            example:
              spec:
                name: web-app
                region: nyc
                services:
                - name: api
                  github:
                    branch: main
                    deploy_on_push: true
                    repo: digitalocean/sample-golang
                  run_command: bin/api
                  environment_slug: node-js
                  instance_count: 2
                  instance_size_slug: apps-s-1vcpu-0.5gb
                  routes:
                  - path: /api
                egress:
                  type: DEDICATED_IP
        required: true
      responses:
        '200':
          $ref: '#/components/responses/new_app'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/apps\"\n  -d '{\"spec\":{\"name\":\"web-app\",\"region\":\"nyc\", \\\n  \"services\":[{\"name\":\"api\",\"github\":{\"branch\":\"main\",\\\n  \"deploy_on_push\":true,\"repo\":\"digitalocean/sample-golang\"}, \\\n  \"run_command\":\"bin/api\",\"environment_slug\":\"node-js\", \\\n  \"instance_count\":2,\"instance_size_slug\":\"apps-s-1vcpu-0.5gb\", \\\n  \"routes\":[{\"path\":\"/api\"}]}]}}'"
      - lang: Python
        source: "import os\nfrom pydo import Client\n\nclient = Client(token=os.environ.get(\"DIGITALOCEAN_TOKEN\"))\n\ncreate_resp = client.apps.create(\n    {\n        \"spec\": {\n            \"name\": \"web-app\",\n            \"region\": \"nyc\",\n            \"services\": [\n                {\n                    \"name\": \"api\",\n                    \"github\": {},\n                    \"run_command\": \"bin/api\",\n                    \"environment_slug\": \"node-js\",\n                    \"instance_count\": 2,\n                    \"instance_size_slug\": \"apps-s-1vcpu-0.5gb\",\n                    \"routes\": [],\n                }\n            ],\n        }\n    }\n)"
      security:
      - bearer_auth:
        - app:create
  /v2/apps/{id}:
    delete:
      operationId: apps_delete
      summary: Delete an App
      description: Delete an existing app. Once deleted, all active deployments will be permanently shut down and the app deleted. If needed, be sure to back up your app specification so that you may re-create it at a later time.
      tags:
      - Apps
      parameters:
      - $ref: '#/components/parameters/id_app'
      responses:
        '200':
          $ref: '#/components/responses/delete_app'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X DELETE \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/apps/{id}\""
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          delete_resp = client.apps.delete(id="b7d64052")'
      security:
      - bearer_auth:
        - app:delete
    get:
      operationId: apps_get
      summary: Retrieve an Existing App
      description: Retrieve details about an existing app by either its ID or name. To retrieve an app by its name, do not include an ID in the request path. Information about the current active deployment as well as any in progress ones will also be included in the response.
      tags:
      - Apps
      parameters:
      - $ref: '#/components/parameters/id_app'
      - $ref: '#/components/parameters/app_name'
      responses:
        '200':
          $ref: '#/components/responses/apps_get'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/apps/{id}\""
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          create_resp = client.apps.get(id="4f6c71e2")'
      security:
      - bearer_auth:
        - app:read
    put:
      operationId: apps_update
      summary: Update an App
      description: Update an existing app by submitting a new app specification. For documentation on app specifications (`AppSpec` objects), please refer to [the product documentation](https://docs.digitalocean.com/products/app-platform/reference/app-spec/).
      tags:
      - Apps
      parameters:
      - $ref: '#/components/parameters/id_app'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/apps_update_app_request'
        required: true
      responses:
        '200':
          $ref: '#/components/responses/update_app'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: 'curl -X PUT \

          -H "Content-Type: application/json" \

          -H "Authorization: Bearer $DIGITALOCEAN_TOKEN" \

          "https://api.digitalocean.com/v2/apps/{id}" \

