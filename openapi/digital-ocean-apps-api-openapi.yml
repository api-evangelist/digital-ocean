          type: string
          example: migrate-db
        source_commit_hash:
          title: The commit hash of the repository that was used to build this job
          type: string
          example: 54d4a727f457231062439895000d45437c7bb405
      type: object
    app_ingress_spec_rule_routing_redirect:
      type: object
      properties:
        uri:
