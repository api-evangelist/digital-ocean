servers:
- url: https://api.digitalocean.com
  description: production
security:
- bearer_auth: []
tags:
- name: Floating IPs
  description: 'As of 16 June 2022, we have renamed the Floating IP product to [Reserved IPs](https://docs.digitalocean.com/reference/api/api-reference/#tag/Reserved-IPs).

    The Reserved IP product''s endpoints function the exact same way as Floating IPs.

    The only difference is the name change throughout the URLs and fields.

    For example, the `floating_ips` field is now the `reserved_ips` field.

    The Floating IP endpoints will remain active until fall 2023 before being

    permanently deprecated.


    With the exception of the [Projects API](https://docs.digitalocean.com/reference/api/api-reference/#tag/Projects),

    we will reflect this change as an additional field in the responses across the API

    where the `floating_ip` field is used. For example, the Droplet metadata response

    will contain the field `reserved_ips` in addition to the `floating_ips` field.

    Floating IPs retrieved using the Projects API will retain the original name.


    [DigitalOcean Floating IPs](https://docs.digitalocean.com/products/networking/reserved-ips/)

    are publicly-accessible static IP addresses that can be mapped to one of

    your Droplets. They can be used to create highly available setups or other

    configurations requiring movable addresses.


    Floating IPs are bound to a specific region.'
paths:
  /v2/floating_ips:
    get:
      operationId: floatingIPs_list
      summary: List All Floating IPs
      description: To list all of the floating IPs available on your account, send a GET request to `/v2/floating_ips`.
      tags:
      - Floating IPs
      parameters:
      - $ref: '#/components/parameters/per_page'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          $ref: '#/components/responses/floating_ip_list'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/floating_ips?page=1&per_page=20\" "
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    opt := &godo.ListOptions{\n        Page:    1,\n        PerPage: 200,\n    }\n\n    floatingIPs, _, err := client.FloatingIPs.List(ctx, opt)\n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          floating_ips = client.floating_ips.all

          floating_ips.each'
      security:
      - bearer_auth:
        - firewall:read
    post:
      operationId: floatingIPs_create
      summary: Create a New Floating IP
      description: "On creation, a floating IP must be either assigned to a Droplet or reserved to a region.\n* To create a new floating IP assigned to a Droplet, send a POST\n  request to `/v2/floating_ips` with the `droplet_id` attribute.\n\n* To create a new floating IP reserved to a region, send a POST request to\n  `/v2/floating_ips` with the `region` attribute.\n\n**Note**:  In addition to the standard rate limiting, only 12 floating IPs may be created per 60 seconds."
      tags:
      - Floating IPs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/floating_ip_create'
      responses:
        '202':
          $ref: '#/components/responses/floating_ip_created'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\"droplet_id\": 123456}' \\\n  \"https://api.digitalocean.com/v2/floating_ips\" "
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    createRequest := &godo.FloatingIPCreateRequest{\n        DropletID: 123456,\n\n    }\n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          floating_ip = DropletKit::FloatingIp.new(droplet_id: 123456)

          client.floating_ips.create(floating_ip) '
      security:
      - bearer_auth:
        - reserved_ip:create
  /v2/floating_ips/{floating_ip}:
    get:
      operationId: floatingIPs_get
      summary: Retrieve an Existing Floating IP
      description: To show information about a floating IP, send a GET request to `/v2/floating_ips/$FLOATING_IP_ADDR`.
      tags:
      - Floating IPs
      parameters:
      - $ref: '#/components/parameters/floating_ip'
      responses:
        '200':
          $ref: '#/components/responses/floating_ip'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/floating_ips/45.55.96.47\" "
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    floatingIP, _, err := client.FloatingIPs.Get(ctx, \"45.55.96.47\")\n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          client.floating_ips.find(ip: ''45.55.96.47'')'
      security:
      - bearer_auth:
        - firewall:read
    delete:
      operationId: floatingIPs_delete
      summary: Delete a Floating IP
      description: 'To delete a floating IP and remove it from your account, send a DELETE request

        to `/v2/floating_ips/$FLOATING_IP_ADDR`.


        A successful request will receive a 204 status code with no body in response.

        This indicates that the request was processed successfully.

        '
      tags:
      - Floating IPs
      parameters:
      - $ref: '#/components/parameters/floating_ip'
      responses:
        '204':
          $ref: '#/components/responses/no_content'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X DELETE \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/floating_ips/45.55.96.47\""
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    _, err := client.FloatingIPs.Delete(ctx, \"45.55.96.34\")\n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          client.floating_ips.delete(ip: ''45.55.96.47'') '
      security:
      - bearer_auth:
        - reserved_ip:delete
components:
  examples:
    floating_ip_reserving:
      summary: Reserving to Region
      value:
        floating_ip:
          ip: 45.55.96.47
          droplet: null
          region:
            name: New York 3
            slug: nyc3
            features:
            - private_networking
            - backups
            - ipv6
            - metadata
            - install_agent
            - storage
            - image_transfer
            available: true
            sizes:
            - s-1vcpu-1gb
