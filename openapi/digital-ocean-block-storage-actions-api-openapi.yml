servers:
- url: https://api.digitalocean.com
  description: production
security:
- bearer_auth: []
tags:
- name: Block Storage Actions
  description: 'Block storage actions are commands that can be given to a DigitalOcean

    Block Storage Volume. An example would be detaching or attaching a volume

    from a Droplet. These requests are made on the

    `/v2/volumes/$VOLUME_ID/actions` endpoint.


    An action object is returned. These objects hold the current status of the

    requested action.'
paths:
  /v2/volumes/actions:
    post:
      operationId: volumeActions_post
      summary: Initiate A Block Storage Action By Volume Name
      description: 'To initiate an action on a block storage volume by Name, send a POST request to

        `~/v2/volumes/actions`. The body should contain the appropriate

        attributes for the respective action.


        ## Attach a Block Storage Volume to a Droplet


        | Attribute   | Details                                                             |

        | ----------- | ------------------------------------------------------------------- |

        | type        | This must be `attach`                                               |

        | volume_name | The name of the block storage volume                                |

        | droplet_id  | Set to the Droplet''s ID                                             |

        | region      | Set to the slug representing the region where the volume is located |


        Each volume may only be attached to a single Droplet. However, up to fifteen

        volumes may be attached to a Droplet at a time. Pre-formatted volumes will be

        automatically mounted to Ubuntu, Debian, Fedora, Fedora Atomic, and CentOS

        Droplets created on or after April 26, 2018 when attached. On older Droplets,

        [additional configuration](https://docs.digitalocean.com/products/volumes/how-to/mount/)

        is required.


        ## Remove a Block Storage Volume from a Droplet


        | Attribute   | Details                                                             |

        | ----------- | ------------------------------------------------------------------- |

        | type        | This must be `detach`                                               |

        | volume_name | The name of the block storage volume                                |

        | droplet_id  | Set to the Droplet''s ID                                             |

        | region      | Set to the slug representing the region where the volume is located |

        '
      tags:
      - Block Storage Actions
      parameters:
      - $ref: '#/components/parameters/per_page'
      - $ref: '#/components/parameters/page'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/volume_action_post_attach'
              - $ref: '#/components/schemas/volume_action_post_detach'
              discriminator:
                propertyName: type
                mapping:
                  attach: '#/components/schemas/volume_action_post_attach'
                  detach: '#/components/schemas/volume_action_post_detach'
            examples:
              VolumeActionAttach:
                value:
                  type: attach
                  volume_name: example
                  droplet_id: 11612190
                  region: nyc1
                  tags:
                  - aninterestingtag
              VolumeActionDetach:
                value:
                  type: detach
                  volume_name: example
                  droplet_id: 11612190
                  region: nyc1
      responses:
        '202':
          $ref: '#/components/responses/volumeAction'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "# Attach a volume to a Droplet by name\ncurl -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\"type\": \"attach\", \"volume_name\": \"example\", \"region\": \"nyc1\", \"droplet_id\": \"11612190\",\"tags\":[\"aninterestingtag\"] }' \\\n  \"https://api.digitalocean.com/v2/volumes/actions\"\n\n# Remove a volume from a Droplet by name\ncurl -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\"type\": \"detach\", \"droplet_id\": \"11612190\", \"volume_name\": \"example\", \"region\": \"nyc1\"}' \\\n  \"https://api.digitalocean.com/v2/volumes/actions\""
      - lang: Python
        source: "import os\nfrom pydo import Client\n\nclient = Client(token=os.environ.get(\"DIGITALOCEAN_TOKEN\"))\n\nreq = {\n  \"type\": \"attach\",\n  \"volume_name\": \"example\",\n  \"droplet_id\": 11612190,\n  \"region\": \"nyc1\",\n  \"tags\": [\n    \"aninterestingtag\"\n  ]\n}\n\nresp = client.volume_actions.post(body=req)"
      security:
      - bearer_auth:
        - block_storage_action:create
  /v2/volumes/{volume_id}/actions:
    get:
      operationId: volumeActions_list
      summary: List All Actions for a Volume
      description: 'To retrieve all actions that have been executed on a volume, send a GET request to `/v2/volumes/$VOLUME_ID/actions`.


        '
      tags:
      - Block Storage Actions
      parameters:
      - $ref: '#/components/parameters/volume_id'
      - $ref: '#/components/parameters/per_page'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          $ref: '#/components/responses/volumeActions'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          $ref: '#/components/responses/not_found'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/volumes/7724db7c-e098-11e5-b522-000f53304e51/actions?page=1&per_page=1\""
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    opt := &godo.ListOptions{\n        Page:    1,\n        PerPage: 200,\n    }\n\n    actions, _, err := client.StorageActions(ctx, \"7724db7c-e098-11e5-b522-000f53304e51\", opt)\n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          actions = client.volume.actions(id: ''7724db7c-e098-11e5-b522-000f53304e51'')

          actions.each'
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.volume_actions.list(volume_id="7724db7c")'
      security:
      - bearer_auth:
        - block_storage_action:read
    post:
      operationId: volumeActions_post_byId
      summary: Initiate A Block Storage Action By Volume Id
      description: 'To initiate an action on a block storage volume by Id, send a POST request to

        `~/v2/volumes/$VOLUME_ID/actions`. The body should contain the appropriate

        attributes for the respective action.


        ## Attach a Block Storage Volume to a Droplet


        | Attribute  | Details                                                             |

        | ---------- | ------------------------------------------------------------------- |

        | type       | This must be `attach`                                               |

        | droplet_id | Set to the Droplet''s ID                                             |

        | region     | Set to the slug representing the region where the volume is located |


        Each volume may only be attached to a single Droplet. However, up to fifteen

        volumes may be attached to a Droplet at a time. Pre-formatted volumes will be

        automatically mounted to Ubuntu, Debian, Fedora, Fedora Atomic, and CentOS

        Droplets created on or after April 26, 2018 when attached. On older Droplets,

        [additional configuration](https://docs.digitalocean.com/products/volumes/how-to/mount/)

        is required.


        ## Remove a Block Storage Volume from a Droplet


        | Attribute  | Details                                                             |

        | ---------- | ------------------------------------------------------------------- |

        | type       | This must be `detach`                                               |

        | droplet_id | Set to the Droplet''s ID                                             |

        | region     | Set to the slug representing the region where the volume is located |


        ## Resize a Volume


        | Attribute      | Details                                                             |

        | -------------- | ------------------------------------------------------------------- |

        | type           | This must be `resize`                                               |

        | size_gigabytes | The new size of the block storage volume in GiB (1024^3)            |

        | region         | Set to the slug representing the region where the volume is located |


        Volumes may only be resized upwards. The maximum size for a volume is 16TiB.

        '
      tags:
      - Block Storage Actions
      parameters:
      - $ref: '#/components/parameters/volume_id'
      - $ref: '#/components/parameters/per_page'
      - $ref: '#/components/parameters/page'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/volume_action_post_attach'
              - $ref: '#/components/schemas/volume_action_post_detach'
              - $ref: '#/components/schemas/volume_action_post_resize'
              discriminator:
                propertyName: type
                mapping:
                  attach: '#/components/schemas/volume_action_post_attach'
                  detach: '#/components/schemas/volume_action_post_detach'
                  resize: '#/components/schemas/volume_action_post_resize'
            examples:
              VolumeActionAttach:
                value:
                  type: attach
                  droplet_id: 11612190
                  region: nyc1
                  tags:
                  - aninterestingtag
              VolumeActionDetach:
                value:
                  type: detach
                  droplet_id: 11612190
                  region: nyc1
              VolumeActionResize:
                value:
                  type: resize
                  size_gigabytes: 100
