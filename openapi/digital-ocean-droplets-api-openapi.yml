  contact:
    name: DigitalOcean API Team
    email: api-engineering@digitalocean.com
  termsOfService: https://www.digitalocean.com/legal/terms-of-service-agreement/
servers:
- url: https://api.digitalocean.com
  description: production
security:
- bearer_auth: []
tags:
- name: Droplets
  description: 'A [Droplet](https://docs.digitalocean.com/products/droplets/) is a DigitalOcean

    virtual machine. By sending requests to the Droplet endpoint, you can

    list, create, or delete Droplets.


    Some of the attributes will have an object value. The `region` and `image`

    objects will all contain the standard attributes of their associated

    types. Find more information about each of these objects in their

    respective sections.'
paths:
  /v2/droplets:
    get:
      operationId: droplets_list
      summary: List All Droplets
      description: 'To list all Droplets in your account, send a GET request to `/v2/droplets`.


        The response body will be a JSON object with a key of `droplets`. This will be

        set to an array containing objects each representing a Droplet. These will

        contain the standard Droplet attributes.


        ### Filtering Results by Tag


        It''s possible to request filtered results by including certain query parameters.

        To only list Droplets assigned to a specific tag, include the `tag_name` query

        parameter set to the name of the tag in your GET request. For example,

        `/v2/droplets?tag_name=$TAG_NAME`.


        ### GPU Droplets


        By default, only non-GPU Droplets are returned. To list only GPU Droplets, set

        the `type` query parameter to `gpus`. For example, `/v2/droplets?type=gpus`.

        '
      tags:
      - Droplets
      parameters:
      - $ref: '#/components/parameters/per_page'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/droplet_tag_name'
      - $ref: '#/components/parameters/droplet_name'
      - $ref: '#/components/parameters/droplet_type'
      responses:
        '200':
          $ref: '#/components/responses/all_droplets'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X GET \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  \"https://api.digitalocean.com/v2/droplets?page=1&per_page=1\""
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    opt := &godo.ListOptions{\n        Page:    1,\n        PerPage: 200,\n    }\n\n    droplets, _, err := client.Droplets.List(ctx, opt)\n}"
      - lang: Ruby
        source: 'require ''droplet_kit''

          token = ENV[''DIGITALOCEAN_TOKEN'']

          client = DropletKit::Client.new(access_token: token)


          droplets = client.droplets.all

          droplets.each'
      - lang: Python
        source: 'import os

          from pydo import Client


          client = Client(token=os.environ.get("DIGITALOCEAN_TOKEN"))


          resp = client.droplets.list()'
      security:
      - bearer_auth:
        - droplet:read
    post:
      operationId: droplets_create
      summary: Create a New Droplet
      description: 'To create a new Droplet, send a POST request to `/v2/droplets` setting the

        required attributes.


        A Droplet will be created using the provided information. The response body

        will contain a JSON object with a key called `droplet`. The value will be an

        object containing the standard attributes for your new Droplet. The response

        code, 202 Accepted, does not indicate the success or failure of the operation,

        just that the request has been accepted for processing. The `actions` returned

        as part of the response''s `links` object can be used to check the status

        of the Droplet create event.


        ### Create Multiple Droplets


        Creating multiple Droplets is very similar to creating a single Droplet.

        Instead of sending `name` as a string, send `names` as an array of strings. A

        Droplet will be created for each name you send using the associated

        information. Up to ten Droplets may be created this way at a time.


        Rather than returning a single Droplet, the response body will contain a JSON

        array with a key called `droplets`. This will be set to an array of JSON

        objects, each of which will contain the standard Droplet attributes. The

        response code, 202 Accepted, does not indicate the success or failure of any

        operation, just that the request has been accepted for processing. The array

        of `actions` returned as part of the response''s `links` object can be used to

        check the status of each individual Droplet create event.

        '
      tags:
      - Droplets
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/droplet_single_create'
              - $ref: '#/components/schemas/droplet_multi_create'
            examples:
              Single Droplet Create Request:
                $ref: '#/components/examples/droplet_create_request'
              Multiple Droplet Create Request:
                $ref: '#/components/examples/droplet_multi_create_request'
      responses:
        '202':
          $ref: '#/components/responses/droplet_create'
        '401':
          $ref: '#/components/responses/unauthorized'
        '429':
          $ref: '#/components/responses/too_many_requests'
        '500':
          $ref: '#/components/responses/server_error'
        default:
          $ref: '#/components/responses/unexpected_error'
      x-codeSamples:
      - lang: cURL
        source: "curl -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n  -d '{\"name\":\"example.com\",\"region\":\"nyc3\",\"size\":\"s-1vcpu-1gb\",\"image\":\"ubuntu-20-04-x64\",\"ssh_keys\":[289794,\"3b:16:e4:bf:8b:00:8b:b8:59:8c:a9:d3:f0:19:fa:45\"],\"backups\":true,\"ipv6\":true,\"monitoring\":true,\"tags\":[\"env:prod\",\"web\"],\"user_data\":\"#cloud-config\\nruncmd:\\n  - touch /test.txt\\n\",\"vpc_uuid\":\"760e09ef-dc84-11e8-981e-3cfdfeaae000\"}' \\\n  \"https://api.digitalocean.com/v2/droplets\""
      - lang: Go
        source: "import (\n    \"context\"\n    \"os\"\n\n    \"github.com/digitalocean/godo\"\n)\n\nfunc main() {\n    token := os.Getenv(\"DIGITALOCEAN_TOKEN\")\n\n    client := godo.NewFromToken(token)\n    ctx := context.TODO()\n\n    createRequest := &godo.DropletCreateRequest{\n        Name:   \"example.com\",\n        Region: \"nyc3\",\n        Size:   \"s-1vcpu-1gb\",\n        Image: godo.DropletCreateImage{\n            Slug: \"ubuntu-20-04-x64\",\n        },\n        SSHKeys: []godo.DropletCreateSSHKey{\n            godo.DropletCreateSSHKey{ID: 289794},\n            godo.DropletCreateSSHKey{Fingerprint: \"3b:16:e4:bf:8b:00:8b:b8:59:8c:a9:d3:f0:19:fa:45\"}\n        },\n        Backups: true,\n        IPv6: true,\n        Monitoring: true,\n        Tags: []string{\"env:prod\",\"web\"},\n        UserData: \"#cloud-config\\nruncmd:\\n  - touch /test.txt\\n\",\n        VPCUUID: \"760e09ef-dc84-11e8-981e-3cfdfeaae000\",\n    }"
      - lang: Ruby
        source: "require 'droplet_kit'\ntoken = ENV['DIGITALOCEAN_TOKEN']\nclient = DropletKit::Client.new(access_token: token)\n\ndroplet = DropletKit::Droplet.new(\n  name: 'example.com',\n  region: 'nyc3',\n  size: 's-1vcpu-1gb',\n  image: 'ubuntu-20-04-x64',\n  ssh_keys: [289794,\"3b:16:e4:bf:8b:00:8b:b8:59:8c:a9:d3:f0:19:fa:45\"],\n  backups: true,\n  ipv6: true,\n  monitoring: true,\n  tags: [\"env:prod\",\"web\"],\n  user_data: \"#cloud-config\\nruncmd:\\n  - touch /test.txt\\n\",\n  vpc_uuid: \"760e09ef-dc84-11e8-981e-3cfdfeaae000\",\n)\nclient.droplets.create(droplet)"
      - lang: Python
        source: "import os\nfrom pydo import Client\n\nclient = Client(token=os.environ.get(\"DIGITALOCEAN_TOKEN\"))\n\nreq = {\n  \"name\": \"example.com\",\n  \"region\": \"nyc3\",\n  \"size\": \"s-1vcpu-1gb\",\n  \"image\": \"ubuntu-20-04-x64\",\n  \"ssh_keys\": [\n    289794,\n    \"3b:16:e4:bf:8b:00:8b:b8:59:8c:a9:d3:f0:19:fa:45\"\n  ],\n  \"backups\": True,\n  \"ipv6\": True,\n  \"monitoring\": True,\n  \"tags\": [\n    \"env:prod\",\n    \"web\"\n  ],\n  \"user_data\": \"#cloud-config\\nruncmd:\\n  - touch /test.txt\\n\",\n  \"vpc_uuid\": \"760e09ef-dc84-11e8-981e-3cfdfeaae000\"\n}\n\nresp = client.droplets.create(body=req)"
      security:
      - bearer_auth:
        - droplet:create
    delete:
      operationId: droplets_destroy_byTag
      summary: Deleting Droplets by Tag
      description: 'To delete **all** Droplets assigned to a specific tag, include the `tag_name`

        query parameter set to the name of the tag in your DELETE request. For

        example,  `/v2/droplets?tag_name=$TAG_NAME`.


        A successful request will receive a 204 status code with no body in response.

        This indicates that the request was processed successfully.

        '
