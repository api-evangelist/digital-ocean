    name: Digital Ocean API
    tags:
      - Cloud
      - Compute
      - Servers
      - Infrastructure
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.digitalocean.com/v2
    humanURL: https://docs.digitalocean.com/reference/api/api-reference/
    properties:
      - url: https://docs.digitalocean.com/reference/api/api-reference/
        type: Documentation
      - url: openapi/digital-ocean-openapi-original.yml
        type: OpenAPI
      - url: https://github.com/digitalocean/openapi
        type: SourceCode
    description: >-
      The DigitalOcean API lets you programmatically manage your Droplets and other
      resources using conventional HTTP requests. Any action that you can perform
      through the DigitalOcean Control Panel (except for creating personal access
      tokens) can also be performed with the API. Resources include Droplets,
      Kubernetes, Apps, Databases, Spaces, Volumes, Load Balancers, Networking,
      Functions, Container Registry, Monitoring, and Billing.
