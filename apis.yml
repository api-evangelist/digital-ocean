aid: digital-ocean
name: Digital Ocean
description: >-
  DigitalOcean Holdings, Inc. is an American multinational technology company and
  cloud service provider. The company is headquartered in New York City, New York,
  US, with 15 globally distributed data centers. DigitalOcean provides developers,
  startups, and SMBs with cloud infrastructure-as-a-service platforms.
